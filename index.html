<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b4f9c">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Calculadora de Autonomia de Baterias | SENAI Hub</title>
<style>
:root{--b:#0b4f9c;--bs:#eaf3ff;--o:#f05a24;--os:#fff1ea;--g:#2e9f65;--gs:#ebf8f1;--r:#d62839;--rs:#fff0f2;--y:#f4a62a;--ys:#fff8e8;--t:#1f2937;--m:#64748b;--l:#dbe5f1;--bg:#f5f8fc;--w:#fff;--sh:0 12px 32px rgba(15,23,42,.08)}
*,*::before,*::after{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top left,rgba(11,79,156,.1),transparent 34%),radial-gradient(circle at bottom right,rgba(240,90,36,.09),transparent 30%),var(--bg);color:var(--t);-webkit-text-size-adjust:100%;font-size:16px}

/* Container fluido e responsivo */
.container{width:100%;max-width:1280px;margin:0 auto;padding:clamp(8px,2vw,16px);max-height:100vh;overflow-x:hidden}

/* Hero responsivo */
.hero{background:var(--w);border:1px solid var(--l);border-radius:clamp(16px,3vw,24px);box-shadow:var(--sh);padding:clamp(12px,2.5vw,18px);display:flex;flex-wrap:wrap;gap:clamp(10px,2.5vw,18px);align-items:center;margin-bottom:clamp(10px,2vw,16px)}
.hero .logo-wrap{flex:0 0 auto;width:100%;max-width:200px;min-width:140px;margin:0 auto}
.logo{background:#050505;border-radius:18px;padding:12px;display:grid;place-items:center;min-height:80px;width:100%}
.logo img{width:100%;max-height:80px;object-fit:contain;display:block}
.hero .hero-content{flex:1 1 300px;min-width:0}
.tag{display:inline-block;background:var(--os);color:var(--o);border:1px solid #ffd8c8;padding:5px 10px;border-radius:999px;font-weight:800;font-size:.8rem;margin-bottom:6px;line-height:1.3;text-align:center;width:100%}
h1{color:var(--b);margin:0;font-size:clamp(1.2rem,3.5vw,2.2rem);line-height:1.12;text-align:center}
.hero p{color:var(--m);margin:6px 0 0;line-height:1.55;font-size:clamp(.8rem,1.5vw,.9rem);text-align:center}

/* Layout principal - mobile first */
.layout{display:grid;grid-template-columns:1fr;gap:clamp(10px,2vw,16px);align-items:start}
@media(min-width:900px){.layout{grid-template-columns:1.05fr .95fr}}

/* Cards */
.card{background:var(--w);border:1px solid var(--l);border-radius:clamp(14px,2.5vw,20px);box-shadow:var(--sh);padding:clamp(12px,2vw,16px);margin-bottom:clamp(10px,2vw,16px)}
h2{color:var(--b);margin:0 0 10px;font-size:clamp(1rem,2vw,1.2rem)}
.num{background:var(--bs);color:var(--b);border:1px solid #cfe3ff;display:inline-grid;place-items:center;width:24px;height:24px;min-width:24px;border-radius:50%;font-size:.8rem;margin-right:5px;font-weight:900}

/* Grid de formulário */
.grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:520px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
.full{grid-column:1/-1}

/* Labels e inputs */
label{display:flex;align-items:center;gap:4px;font-weight:800;color:#243044;margin-bottom:4px;font-size:.85rem;flex-wrap:wrap;justify-content:flex-start}
input,select{width:100%;padding:clamp(9px,1.5vw,11px);border:1px solid #cbd5e1;border-radius:10px;font-size:clamp(.85rem,1.5vw,.95rem);background:var(--w);outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,select:focus{border-color:var(--b);box-shadow:0 0 0 3px rgba(11,79,156,.12)}

/* Botão de ajuda */
.help{border:0;width:20px;height:20px;min-width:20px;padding:0;border-radius:50%;background:var(--os);color:var(--o);font-weight:900;cursor:pointer;font-size:.75rem;display:inline-grid;place-items:center;touch-action:manipulation}
.hint,.small{color:var(--m);font-size:.78rem;margin-top:3px;line-height:1.4}

/* Ações */
.actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
button{border:0;border-radius:12px;padding:9px 12px;min-height:42px;font-weight:900;cursor:pointer;font-size:.85rem;touch-action:manipulation;transition:opacity .2s,transform .1s}
button:active{transform:scale(.97)}
.primary{background:var(--b);color:var(--w)}
.secondary{background:var(--o);color:var(--w)}
.ghost{background:var(--bs);color:var(--b);border:1px solid #cfe3ff}
.install{background:var(--g);color:var(--w);display:none}

/* Tabela responsiva */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--l);border-radius:12px;margin:0 -4px}
table{width:100%;min-width:380px;border-collapse:collapse;background:var(--w);font-size:clamp(.75rem,1.2vw,.85rem)}
th{background:var(--bs);color:var(--b);text-align:left;padding:8px 6px;border-bottom:2px solid #cfe3ff;white-space:nowrap;font-size:.8rem}
td{padding:6px 6px;border-bottom:1px solid #edf2f7;font-size:.8rem}
td input{padding:6px 5px;border-radius:7px;min-width:50px;font-size:.8rem}
td input[type="number"]{width:clamp(50px,100%,80px)}

/* Resultados */
.results{display:grid;grid-template-columns:1fr;gap:8px}
@media(min-width:380px){.results{grid-template-columns:repeat(2,minmax(0,1fr))}}
.result{background:#f8fbff;border:1px solid #dbeafe;border-left:4px solid var(--b);border-radius:14px;padding:10px;min-height:auto}
.result.orange{background:var(--os);border-color:#ffd8c8;border-left-color:var(--o)}
.result.green{background:var(--gs);border-color:#ccebd8;border-left-color:var(--g)}
.result.red{background:var(--rs);border-color:#ffd1d7;border-left-color:var(--r)}
.r-title{color:#334155;font-weight:900;font-size:.78rem;margin-bottom:3px}
.r-value{color:var(--b);font-size:clamp(1.1rem,2.5vw,1.5rem);font-weight:900;text-align:center}
.orange .r-value{color:var(--o)}.green .r-value{color:var(--g)}.red .r-value{color:var(--r)}

/* Pill */
.pill{display:inline-block;padding:5px 10px;background:var(--os);color:var(--o);border:1px solid #ffd8c8;border-radius:999px;font-weight:900;margin-bottom:8px;font-size:.8rem;text-align:center;width:100%}

/* Tabs */
.tabs{display:flex;flex-wrap:wrap;gap:5px;margin:12px 0 6px}
.tab{background:var(--bs);color:var(--b);border:1px solid #cfe3ff;padding:7px 10px;border-radius:999px;font-size:.8rem;cursor:pointer;touch-action:manipulation;white-space:nowrap;text-align:center;flex:1 1 auto}
.tab.active{background:var(--b);color:var(--w)}
.content{display:none}.content.active{display:block}

/* Boxes */
.box{background:#f8fbff;border:1px solid #dbeafe;border-radius:12px;padding:10px;line-height:1.4;margin:6px 0;font-size:clamp(.8rem,1.2vw,.88rem)}
.box.green{background:var(--gs);border-color:#ccebd8}
.box.yellow{background:var(--ys);border-color:#ffe3ad}
.formula{background:#f7f9fc;border:1px solid var(--l);border-left:4px solid var(--o);border-radius:12px;padding:10px;margin:6px 0;line-height:1.5;font-size:clamp(.8rem,1.2vw,.88rem)}
.formula strong{color:var(--b)}

/* Tech grid */
.tech-grid{display:grid;grid-template-columns:1fr;gap:8px}
@media(min-width:500px){.tech-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
.tech{background:var(--w);border:1px solid var(--l);border-radius:14px;padding:10px;line-height:1.4;display:flex;flex-direction:column;gap:5px}
.tech img{width:100%;height:auto;max-height:150px;object-fit:contain;background:var(--w);border-radius:10px;aspect-ratio:4/3}
.tech b{color:var(--b);display:block;font-size:.95rem}
.badge{align-self:flex-start;border-radius:999px;padding:3px 7px;font-weight:800;font-size:.75rem;background:var(--bs);color:var(--b)}
.specs{font-size:.78rem;color:#334155;line-height:1.3}

/* SVG */
.curve{background:var(--w);border:1px solid var(--l);border-radius:14px;padding:8px;margin-top:8px;overflow:hidden}
.curve svg{width:100%;height:auto;max-height:220px;display:block}

/* Footer */
.footer{text-align:center;color:var(--m);padding:12px 6px 18px;line-height:1.4;font-size:.8rem}.footer b{color:var(--b)}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;align-items:center;justify-content:center;padding:clamp(8px,3vw,14px)}
.modal{width:100%;max-width:500px;background:var(--w);border-radius:18px;padding:clamp(12px,2.5vw,16px);box-shadow:0 20px 70px rgba(0,0,0,.28);border:1px solid var(--l);max-height:85vh;overflow-y:auto;position:relative}
.modal h3{margin-top:0;color:var(--b);font-size:clamp(1rem,2vw,1.2rem);padding-right:60px;font-size:1.1rem}
.modal p{line-height:1.5;color:#334155;font-size:clamp(.8rem,1.5vw,.9rem)}
.close{position:absolute;top:10px;right:10px;background:var(--os);color:var(--o);border:1px solid #ffd8c8;min-height:32px;padding:5px 12px;border-radius:9px;cursor:pointer;font-weight:800;font-size:.8rem;z-index:2;touch-action:manipulation}

/* Scroll suave */
html{scroll-behavior:smooth}

/* Sticky aside - apenas desktop */
@media(min-width:900px){aside.sticky{position:sticky;top:10px}}

/* Ajustes para tablets e mobile pequeno */
@media(max-width:899px){
  .hero .logo-wrap{max-width:170px;margin:0 auto}
  .hero{justify-content:center;text-align:center;padding:10px}
  .hero .hero-content{text-align:center}
  .tag{margin:0 auto;display:table;width:auto;max-width:70%}
  h1{font-size:1.4rem}
}

/* Mobile pequeno */
@media(max-width:480px){
  .container{padding:8px}
  .hero .logo-wrap{max-width:140px}
  .hero{padding:10px;gap:8px;border-radius:14px}
  .logo{min-height:70px;padding:8px;border-radius:16px}
  .actions{display:grid;grid-template-columns:1fr}
  button{width:100%;justify-content:center;text-align:center;margin-bottom:4px}
  .tabs{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr))}
  .tab{text-align:center;padding:6px 8px;font-size:.75rem}
  .card{padding:10px;border-radius:12px;margin-bottom:10px}
  .table-wrap{border-radius:8px;margin:0 -2px}
  table{min-width:360px;font-size:.75rem}
  th,td{padding:5px 4px}
  .help{width:22px;height:22px;min-width:22px;font-size:.7rem}
  .r-value{font-size:1.1rem}
  h2{font-size:1rem}
  .result{padding:8px;border-radius:12px}
  .pill, .tag{font-size:.75rem;padding:4px 8px}
  .tech-grid{gap:6px}
  .tech{padding:8px;border-radius:12px}
  .tech img{max-height:130px}
  .box, .formula{padding:8px;margin:5px 0;font-size:.78rem}
  .curve svg{max-height:200px}
}

/* Impressão */
@media(print){
  body{background:var(--w);font-size:12px}
  .container{width:100%;padding:0;max-width:none}
  .hero,.card{box-shadow:none;page-break-inside:avoid;border:1px solid #ccc}
  button,.tabs,.help,.install{display:none!important}
  .content{display:block!important}
  .layout{grid-template-columns:1fr}
  .table-wrap{overflow:visible}
  table{min-width:0}
  .modal-bg{display:none!important}
  .grid,.results,.tech-grid{grid
